version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zeus-api:
    build:
      context: ../..
      dockerfile: .zeus/v3/Dockerfile
    environment:
      - ZEUS_MODE=serve
      - ZEUS_DATABASE_URL=sqlite+aiosqlite:////app/.zeus/v3/state.db
    command:
      - --mode=serve
      - --project-root=/app
      - --host=0.0.0.0
      - --port=8000
      - --database-url=sqlite+aiosqlite:////app/.zeus/v3/state.db
      - --queue-backend=redis
      - --redis-url=redis://redis:6379/0
      - --no-embedded-scheduler
    ports:
      - "8000:8000"
    volumes:
      - zeus_state:/app/.zeus/v3
    depends_on:
      - redis
    restart: unless-stopped

  zeus-scheduler:
    build:
      context: ../..
      dockerfile: .zeus/v3/Dockerfile
    environment:
      - ZEUS_MODE=scheduler
      - ZEUS_DATABASE_URL=sqlite+aiosqlite:////app/.zeus/v3/state.db
    command:
      - --mode=scheduler
      - --project-root=/app
      - --database-url=sqlite+aiosqlite:////app/.zeus/v3/state.db
      - --queue-backend=redis
      - --redis-url=redis://redis:6379/0
    volumes:
      - zeus_state:/app/.zeus/v3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped

  zeus-worker:
    build:
      context: ../..
      dockerfile: .zeus/v3/Dockerfile
    environment:
      - ZEUS_MODE=worker
      - ZEUS_MAX_WORKERS=3
      - ZEUS_DATABASE_URL=sqlite+aiosqlite:////app/.zeus/v3/state.db
    command:
      - --mode=worker
      - --project-root=/app
      - --max-workers=3
      - --database-url=sqlite+aiosqlite:////app/.zeus/v3/state.db
      - --queue-backend=redis
      - --redis-url=redis://redis:6379/0
    volumes:
      - zeus_state:/app/.zeus/v3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    deploy:
      replicas: 2
    restart: unless-stopped

volumes:
  redis_data:
  zeus_state:
