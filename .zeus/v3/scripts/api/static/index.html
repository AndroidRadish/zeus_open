<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeusOpen v3 Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
  header { background: #1e293b; padding: 1rem 1.5rem; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
  h1 { margin: 0; font-size: 1.25rem; color: #38bdf8; }
  .status { font-size: .875rem; color: #94a3b8; }
  .status.online { color: #4ade80; }
  .status.offline { color: #f87171; }
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: .5rem; padding: 1rem; text-align: center; }
  .card .value { font-size: 1.5rem; font-weight: 700; }
  .card .label { font-size: .75rem; color: #94a3b8; margin-top: .25rem; }
  .section { background: #1e293b; border: 1px solid #334155; border-radius: .5rem; padding: 1rem; margin-bottom: 1rem; }
  .section h2 { margin: 0 0 .75rem; font-size: 1rem; color: #bae6fd; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  th, td { padding: .5rem .75rem; text-align: left; border-bottom: 1px solid #334155; }
  th { color: #94a3b8; font-weight: 500; }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
  .badge.pending { background: #f59e0b22; color: #f59e0b; }
  .badge.running { background: #3b82f622; color: #3b82f6; }
  .badge.completed { background: #22c55e22; color: #22c55e; }
  .badge.failed { background: #ef444422; color: #ef4444; }
  .events { max-height: 240px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: .75rem; }
  .events li { padding: .25rem 0; border-bottom: 1px solid #334155; list-style: none; }
  .events li span { color: #94a3b8; margin-right: .5rem; }
</style>
</head>
<body>
<header>
  <h1>⚡ ZeusOpen v3 Dashboard</h1>
  <div id="connStatus" class="status offline">SSE: disconnected</div>
</header>
<main>
  <div class="metrics" id="metrics">
    <div class="card"><div class="value" id="mTotal">-</div><div class="label">Total</div></div>
    <div class="card"><div class="value" id="mCompleted">-</div><div class="label">Completed</div></div>
    <div class="card"><div class="value" id="mFailed">-</div><div class="label">Failed</div></div>
    <div class="card"><div class="value" id="mPending">-</div><div class="label">Pending</div></div>
    <div class="card"><div class="value" id="mRunning">-</div><div class="label">Running</div></div>
    <div class="card"><div class="value" id="mPassRate">-</div><div class="label">Pass Rate</div></div>
  </div>

  <div class="section">
    <h2>Tasks</h2>
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Wave</th><th>Status</th><th>Pass</th></tr></thead>
      <tbody id="taskTable"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Live Events</h2>
    <ul class="events" id="events"></ul>
  </div>
</main>

<script>
const base = '';

async function fetchMetrics() {
  try {
    const res = await fetch(base + '/metrics/summary');
    const d = await res.json();
    document.getElementById('mTotal').textContent = d.total_tasks ?? '-';
    document.getElementById('mCompleted').textContent = d.completed ?? '-';
    document.getElementById('mFailed').textContent = d.failed ?? '-';
    document.getElementById('mPending').textContent = d.pending ?? '-';
    document.getElementById('mRunning').textContent = d.running ?? '-';
    document.getElementById('mPassRate').textContent = d.pass_rate != null ? (d.pass_rate * 100).toFixed(1) + '%' : '-';
  } catch (e) { console.error('metrics error', e); }
}

async function fetchTasks() {
  try {
    const res = await fetch(base + '/tasks');
    const tasks = await res.json();
    const tbody = document.getElementById('taskTable');
    tbody.innerHTML = tasks.map(t => {
      const statusClass = ['pending','running','completed','failed'].includes(t.status) ? t.status : 'pending';
      return `<tr>
        <td>${t.id}</td>
        <td>${t.title || ''}</td>
        <td>${t.wave ?? '-'}</td>
        <td><span class="badge ${statusClass}">${t.status}</span></td>
        <td>${t.passes ? '✅' : '❌'}</td>
      </tr>`;
    }).join('');
  } catch (e) { console.error('tasks error', e); }
}

function connectSSE() {
  const es = new EventSource(base + '/events/stream');
  const status = document.getElementById('connStatus');
  es.onopen = () => { status.textContent = 'SSE: connected'; status.className = 'status online'; };
  es.onerror = () => { status.textContent = 'SSE: error'; status.className = 'status offline'; };
  es.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      const list = document.getElementById('events');
      const li = document.createElement('li');
      const time = new Date().toLocaleTimeString();
      li.innerHTML = `<span>[${time}]</span> <strong>${msg.event}</strong> ${JSON.stringify(msg.data)}`;
      list.prepend(li);
      while (list.children.length > 50) list.lastChild.remove();
      // Refresh tasks/metrics on task state changes
      if (msg.event && msg.event.startsWith('task.')) {
        fetchTasks();
        fetchMetrics();
      }
    } catch (e) { console.error('sse parse error', e); }
  };
}

fetchMetrics();
fetchTasks();
connectSSE();
setInterval(fetchMetrics, 5000);
setInterval(fetchTasks, 5000);
</script>
</body>
</html>
